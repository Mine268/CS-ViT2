defaults:
  - _self_
  - augmentation: color_jitter_only
  - override hydra/job_logging: none
  - override hydra/hydra_logging: none

hydra:
  output_subdir: null
  run:
    dir: .
  job_logging:
    root:
      handlers: []

AIM:
  server_url: aim://10.208.33.93:53800

GENERAL:
  description: "[no_norm] Stage2 without norm_by_hand"
  total_step: 50000
  log_step: 10
  vis_step: 100
  checkpoint_step: 3000
  warmup_step: 5000
  dropout_warmup_step: 10000  # Dropout渐进式预热步数
  cosine_cycle: 0.4
  num_worker: 2
  prefetch_factor: 1
  seed: 3229084
  val_seed: 42  # 验证集固定seed，确保每次验证使用相同数据
  resume_path: null

TEST:
  output_dir: output/test_results
  batch_size: 16        # 测试时的 batch size（可通过命令行覆盖）
  save_format: hdf5     # 保存格式
  compression: gzip     # HDF5 压缩方式
  max_samples: null     # 限制样本数（调试用，null=全部）
  vis_step: 100         # 可视化频率
  enable_vis: true      # 是否启用可视化到 AIM
  checkpoint_path: null # checkpoint 路径（必须通过命令行指定）

TRAIN:
  lr: 1e-4
  backbone_lr: 1e-5
  grad_accum_step: 1
  max_grad: 1.0
  weight_decay: 1e-4
  sample_per_device: 6
  mixed_precision: "bf16"
  expansion_ratio: 2.0
  scale_z_range: [1., 1.]  # 保持不变，数据标注有问题
  scale_f_range: [1., 1.]  # 关闭 focal 扰动，先稳定绝对几何学习
  persp_rot_max: 0.0872664626 # pi/36 ≈ 5°, 轻量透视旋转增强
  perspective_normalization: false  # true=透视归一化(bbox中心旋转到主点), false=原始方式
  augmentation: ${augmentation}  # 引用顶层augmentation配置组

DATA:
  train:
    source: [
      /mnt/qnap/data/datasets/webdatasets2/AssemblyHands/train/*,
      /mnt/qnap/data/datasets/webdatasets2/COCO-WholeBody/train/*,
      /mnt/qnap/data/datasets/webdatasets2/DexYCB/s1/train/*,
      /mnt/qnap/data/datasets/webdatasets2/FreiHAND/train/*,
      /mnt/qnap/data/datasets/webdatasets2/HO3D_v3/train/*,
      /mnt/qnap/data/datasets/webdatasets2/HOT3D/train/*,
      /mnt/qnap/data/datasets/webdatasets2/InterHand2.6M/train/*,
      /mnt/qnap/data/datasets/webdatasets2/MTC/train/*,
      /mnt/qnap/data/datasets/webdatasets2/RHD/train/*,
    ]
    stride: 1
    reweight:
      enabled: true
      split: train
      datasets:
        - name: AssemblyHands
          source: /mnt/qnap/data/datasets/webdatasets2/AssemblyHands/train/*
          weight: 0.10
        - name: COCO-WholeBody
          source: /mnt/qnap/data/datasets/webdatasets2/COCO-WholeBody/train/*
          weight: 0.10
        - name: DexYCB
          source: /mnt/qnap/data/datasets/webdatasets2/DexYCB/s1/train/*
          weight: 0.10
        - name: FreiHAND
          source: /mnt/qnap/data/datasets/webdatasets2/FreiHAND/train/*
          weight: 0.15
        - name: HO3D_v3
          source: /mnt/qnap/data/datasets/webdatasets2/HO3D_v3/train/*
          weight: 0.10
        - name: HOT3D
          source: /mnt/qnap/data/datasets/webdatasets2/HOT3D/train/*
          weight: 0.10
        - name: InterHand2.6M
          source: /mnt/qnap/data/datasets/webdatasets2/InterHand2.6M/train/*
          weight: 0.20
        - name: MTC
          source: /mnt/qnap/data/datasets/webdatasets2/MTC/train/*
          weight: 0.15
        - name: RHD
          source: /mnt/qnap/data/datasets/webdatasets2/RHD/train/*
          weight: 0.10
      shardshuffle: 64
      post_clip_shuffle: 64
    depth_bins:
      # 当前 9 数据集混训默认走 reweight；depth_bins 仍只保留给旧的 4 数据集实验。
      enabled: false
      root: /mnt/qnap/data/datasets/webdatasets/depth-bins
      dataset_names: [InterHand2.6M, DexYCB_s1, HO3D_v3, HOT3D]
      split: train
      selected_bins: null
      mix_strategy: uniform_random
      bin_weights: null
      dataset_balance_alpha: 0.0
      min_cell_samples: 1000
      shardshuffle: 64
      sample_shuffle: 64
    sampling:
      mode: random_clip
      clips_per_sequence: 1
      shardshuffle: 64
      post_clip_shuffle: 64
  val:
    source: [
      /mnt/qnap/data/datasets/webdatasets2/InterHand2.6M/val/*,
      /mnt/qnap/data/datasets/webdatasets2/DexYCB/s1/val/*,
    ]
    stride: 1
    full_eval: false
    max_val_step: 1000
    sampling:
      mode: dense
      shardshuffle: false
      post_clip_shuffle: 0
  test:
    source: []  # 默认为空，通过命令行指定
    stride: 1   # 测试时的帧采样步长
    full_eval: false
    sampling:
      mode: dense
      shardshuffle: false
      post_clip_shuffle: 0

MODEL:
  img_size: 224
  img_mean: [0.485, 0.456, 0.406]
  img_std: [0.229, 0.224, 0.225]
  stage: stage2
  stage1_weight: null  # 必须通过命令行指定对应的无归一化 Stage1 checkpoint
  num_frame: 7  # Stage 2 时序建模需要 > 1 帧
  joint_type: "3"
  norm_by_hand: false  # 禁用手部归一化，直接预测原始相机坐标系下的 trans
  backbone:
    backbone_str: model/facebook/dinov2-large
    infusion_layer: null
    drop_cls: false
    kwargs:
      # mask_ratio: 0.0
  handec:
    num_layer: 4
    num_head: 16
    dim_head: 64
    dim_mlp: 4096
    dropout: 0.1  # 启用dropout提升泛化性
    norm: layer
    context_dim: 1024
    skip_token_embed: false
    use_mean_init: false
    denorm_output: false
    cam_head_type: softargmax3d
    heatmap_resolution: [512, 512, 1024]  # 提高分辨率，Z轴更高因为范围更大
    root_z:
      num_bins: 8
      d_min: -0.73
      d_max: 0.74
      prior_k: 121.0
      geom_hidden_dim: 256
      dropout: 0.1
      use_data_source_embed: false
  persp_info_embed:
    type: "ca"
    num_sample: 8
    pie_fusion: "all"
  temporal_encoder:
    num_layer: 2
    num_head: 16
    trope_scalar: 20.0
    zero_linear: true

LOSS:
  lambda_theta: 3.0
  lambda_shape: 3.0
  lambda_trans: 0.001      # 降低根关节loss权重 (0.05 → 0.001)，因为无归一化时 trans 值更大（mm单位）
  lambda_root_z_cls: 1.0
  lambda_root_z_res: 1.0
  lambda_rel: 0.012        # 降低相对关节loss权重 (0.015 → 0.012)
  lambda_img: 0.002
  lambda_coco_patch_2d: 0.0005
  supervise_global: true
  supervise_heatmap: true
  heatmap_sigma: 2.0       # 调整heatmap_sigma (0.09 → 0.006)，适应无归一化的原始尺度
  reproj_loss_type: "l1"   # 重投影loss类型: "l1" 或 "robust_l1"
  reproj_loss_delta: 84.0         # RobustL1Loss阈值(像素), 基于训练log分析的95分位
